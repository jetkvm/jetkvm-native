name: Build JetKVM Native
on:
  push:
    branches:
      - dev
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: buildjet-16vcpu-ubuntu-2204 
    name: Build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up build dependencies
        run: |
          sudo apt-get update &&
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            device-tree-compiler \
            gperf g++-multilib gcc-multilib \
            libnl-3-dev libdbus-1-dev libelf-dev libmpc-dev dwarves
      - name: Download and extract buildkit
        run: |
          BUILDKIT_VERSION=v0.2.5
          wget -O jetkvm-native-buildkit.tar.zst https://github.com/jetkvm/rv1106-system/releases/download/${BUILDKIT_VERSION}/buildkit.tar.zst
          mkdir /opt/jetkvm-native-buildkit
          tar --use-compress-program="unzstd --long=31" -xvf jetkvm-native-buildkit.tar.zst -C /opt/jetkvm-native-buildkit
      - name: Build
        run: |
          make
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jetkvm_native
          path: build/bin/jetkvm_native
          retention-days: 7

  release:
    # no need to use buildjet runners, as we only need to create a release
    runs-on: ubuntu-latest
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
      - name: Draft release
        uses: softprops/action-gh-release@v2
        with:
          # need review before making a real release
          draft: true
          files: |
            ./jetkvm_native/jetkvm_native
          fail_on_unmatched_files: true
          tag_name: ${{ github.ref }}
          name: ${{ github.ref }}
          generate_release_notes: true
